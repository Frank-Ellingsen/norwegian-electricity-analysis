name: NO2 Forecasting Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint code
        run: |
          pip install pylint
          pylint api pipeline --disable=R,C

      - name: Run NO2 pipeline
        run: |
          python run_pipeline.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: catboost-model
          path: models/catboost_no2.cbm

      - name: Upload forecast outputs
        uses: actions/upload-artifact@v4
        with:
          name: forecast-output
          path: output/*.csv
